<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript基础知识练习</title>
  </head>
  <body>
    <h1>JavaScript基础知识练习</h1>
    <script>
        // 变量的定义
        var name = "Alice";
        let age = 30;
        const PI = 3.14;
        // 打印变量
        console.log("Name:", name);
        console.log("Age:", age);
        console.log("PI:", PI);
        // 变量的类型
        console.log("Type of name:", typeof name);
        console.log("Type of age:", typeof age);
        console.log("Type of PI:", typeof PI);
        // JavaScript中的数据类型
        let isStudent = true; // Boolean   
        let score = null; // Null
        let undefinedVar; // Undefined
        console.log("Is student:", isStudent);
        console.log("Score:", score);
        console.log("Undefined variable:", undefinedVar);
        // 运算符与表达式 （加上注释，请全面补全）
        let a = 10;
        let b = 5;
        // 算术运算符
        console.log("a + b =", a + b); // 加法
        console.log("a - b =", a - b); // 减法
        console.log("a * b =", a * b); // 乘法
        console.log("a / b =", a / b); // 除法
        console.log("a % b =", a % b); // 取模

        // 流程控制
        let score2 = 85;
        if (score2 >= 90) {
            console.log("Grade: A");
        } else if (score2 >= 80) {
            console.log("Grade: B");
        } else if (score2 >= 70) {
            console.log("Grade: C");
        } else if (score2 >= 60) {
            console.log("Grade: D");
        } else {
            console.log("Grade: F");
        }
        // 循环控制
        console.log("For loop:");
        for (let i = 0; i < 5; i++) {
            console.log(i);
        }
        console.log("While loop:");
        let j = 0;
        while (j < 5) {
            console.log(j);
            j++;
        }
        // 函数定义与调用
        function greet(name) {
            return "Hello, " + name + "!";
        }
        console.log(greet("Alice"));

        </Script>
    </body>
</html>
